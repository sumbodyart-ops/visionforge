<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Visionforge</title>

<style>
body {
  margin:0;
  padding:40px;
  font-family:Arial;
  background:#07070a;
  color:#fff;
}

textarea {
  width:100%;
  min-height:150px;
  padding:12px;
  border-radius:10px;
  border:1px solid #333;
  background:#0f172a;
  color:#fff;
}

button {
  padding:10px 16px;
  border:none;
  border-radius:8px;
  margin-right:10px;
  cursor:pointer;
}

.primary-btn {
  background:#4f46e5;
  color:#fff;
}

.secondary-btn {
  background:#1f2937;
  color:#fff;
}

.result-card {
  background:#111827;
  padding:14px;
  border-radius:10px;
  margin-bottom:10px;
  border:1px solid #374151;
}
</style>
</head>

<body>

<h1>Visionforge</h1>

<textarea id="prompt" placeholder="Enter your idea..."></textarea>

<br><br>

<button class="primary-btn" onclick="generate()">Generate</button>
<button class="secondary-btn" onclick="clearPrompt()">Clear</button>
<button class="secondary-btn" onclick="copyResult()">Copy Result</button>

<br><br>

<div id="result">Your result will appear here.</div>

<script>

function clearPrompt(){
  document.getElementById("prompt").value="";
  document.getElementById("result").innerHTML="Your result will appear here.";
}

function prettifyResult(text){
  return text
    .replace(/CONCEPT TITLE:/g,"🔥 CONCEPT TITLE:")
    .replace(/CORE PROMPT:/g,"🎯 CORE PROMPT:")
    .replace(/SCENE BREAKDOWN:/g,"🎬 SCENE BREAKDOWN:")
    .replace(/CAMERA NOTES:/g,"📸 CAMERA NOTES:")
    .replace(/LIGHTING NOTES:/g,"💡 LIGHTING NOTES:")
    .replace(/STYLE KEYWORDS:/g,"🎨 STYLE KEYWORDS:")
    .replace(/OPTIONAL VOICEOVER:/g,"🎙 OPTIONAL VOICEOVER:");
}

function formatToHTML(text){
  return text.split("\n\n").map(section=>{
    return `<div class="result-card">${section.replace(/\n/g,"<br>")}</div>`;
  }).join("");
}

async function generate(){

  const prompt = document.getElementById("prompt").value.trim();
  const resultBox = document.getElementById("result");

  if(!prompt){
    resultBox.innerText="Please enter an idea first.";
    return;
  }

  resultBox.innerText="Generating...";

  try{

    const res = await fetch("/generate",{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({prompt})
    });

    const data = await res.json();

    // ✅ FIXED MATCH TO YOUR SERVER
    if(!data.result){
      resultBox.innerText="No response";
      return;
    }

    const formatted = prettifyResult(data.result);
    resultBox.innerHTML = formatToHTML(formatted);

  }catch(err){
    resultBox.innerText="Something went wrong.";
  }
}

function copyResult(){
  const text = document.getElementById("result").innerText;
  navigator.clipboard.writeText(text);
}

</script>

</body>
</html>
