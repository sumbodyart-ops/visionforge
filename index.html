<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visyonix</title>

<style>
body {
  margin: 0;
  font-family: Inter, sans-serif;
  background: radial-gradient(circle at top, #0b1020, #05070f);
  color: #fff;
}

/* CONTAINER */
.container {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* HERO CARD */
.hero {
  width: 100%;
  max-width: 1100px;
  padding: 40px;
  border-radius: 24px;
  background: linear-gradient(135deg, rgba(79,70,229,0.15), rgba(255,255,255,0.02));
  border: 1px solid rgba(255,255,255,0.08);
  box-shadow: 0 30px 80px rgba(0,0,0,0.5);
  display: flex;
  justify-content: center;
  align-items: center;
}

/* LOGO ONLY */
.logo {
  width: 100%;
  max-width: 650px;
  height: auto;
  filter: drop-shadow(0 0 50px rgba(120,80,255,1));
}

/* MOBILE */
@media (max-width: 768px) {
  .logo {
    max-width: 90%;
  }
}
</style>
</head>

<body>

<div class="container">
  <div class="hero">
    <img src="logo.png" class="logo">
  </div>
</div>

</body>
</html>
