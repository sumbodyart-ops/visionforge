<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Visionforge</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:#fff;
  padding:30px;
}
textarea {
  width:100%;
  height:120px;
  margin-bottom:10px;
}
button {
  padding:10px;
  margin-right:10px;
}
.result-card {
  background:#111827;
  padding:15px;
  margin-bottom:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<h1>Visionforge</h1>

<textarea id="prompt" placeholder="Enter your idea..."></textarea>

<br>

<button onclick="generate()">Generate</button>
<button onclick="clearPrompt()">Clear</button>
<button onclick="copyResult()">Copy</button>

<div id="result">Your result will appear here.</div>

<script>

function clearPrompt(){
  document.getElementById("prompt").value="";
  document.getElementById("result").innerText="Your result will appear here.";
}

async function generate(){

  const prompt = document.getElementById("prompt").value.trim();
  const resultBox = document.getElementById("result");

  if(!prompt){
    resultBox.innerText="Enter something first";
    return;
  }

  resultBox.innerText="Generating...";

  try{

    const res = await fetch("/generate",{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({prompt})
    });

    const data = await res.json();

    // ✅ FIXED HERE
    if(!data.result){
      resultBox.innerText="No response";
      return;
    }

    resultBox.innerHTML = formatToHTML(data.result);

  }catch(err){
    resultBox.innerText="Error generating";
  }
}

function formatToHTML(text){
  return text.split("\n\n").map(section=>{
    return `<div class="result-card">${section.replace(/\n/g,"<br>")}</div>`;
  }).join("");
}

function copyResult(){
  const text = document.getElementById("result").innerText;
  navigator.clipboard.writeText(text);
}

</script>

</body>
</html>
