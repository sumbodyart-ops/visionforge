<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visyonix</title>
<link rel="icon" type="image/png" href="logo.png">

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background:
    radial-gradient(circle at top, rgba(99,102,241,0.14), transparent 30%),
    linear-gradient(180deg, #07070a 0%, #111827 100%);
  color: white;
}

.wrap {
  max-width: 1100px;
  margin: auto;
  padding: 20px;
}

/* HERO */
.hero {
  text-align: center;
  margin-bottom: 30px;
}

.hero-badge {
  margin-bottom: 15px;
  display: inline-block;
  padding: 6px 14px;
  border-radius: 999px;
  background: rgba(99,102,241,0.2);
  font-size: 12px;
}

/* 🔥 BIG LOGO AREA */
.brand-row {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 55vh;
  min-height: 320px;
}

.brand-logo {
  height: 100%;
  max-height: 520px;
  width: auto;
  object-fit: contain;

  animation: floatLogo 4.5s ease-in-out infinite,
             pulseGlow 3s ease-in-out infinite;
}

/* FLOAT */
@keyframes floatLogo {
  0% { transform: translateY(0); }
  50% { transform: translateY(-12px); }
  100% { transform: translateY(0); }
}

/* GLOW */
@keyframes pulseGlow {
  0% {
    filter: drop-shadow(0 0 20px rgba(120,80,255,0.5));
  }
  50% {
    filter: drop-shadow(0 0 60px rgba(168,85,247,1));
  }
  100% {
    filter: drop-shadow(0 0 20px rgba(120,80,255,0.5));
  }
}

/* TEXT */
.subtext {
  font-size: 18px;
  color: #d1d5db;
  margin-bottom: 10px;
}

.hero-caption {
  font-size: 14px;
  color: #9ca3af;
  border-left: 3px solid rgba(99,102,241,0.4);
  padding-left: 10px;
  max-width: 700px;
  margin: auto;
  text-align: left;
}

/* PANEL */
.panel {
  background: rgba(255,255,255,0.04);
  padding: 20px;
  border-radius: 16px;
}

/* MODES */
.modes {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-bottom: 15px;
}

.mode-btn {
  padding: 10px 14px;
  border-radius: 999px;
  border: 1px solid #374151;
  background: #111827;
  cursor: pointer;
}

.mode-btn.active {
  background: linear-gradient(135deg, #6366f1, #8b5cf6);
}

/* INPUT */
textarea {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  background: #0f172a;
  color: white;
  margin-bottom: 12px;
}

/* ACTION ROW */
.action-row {
  display: flex;
  gap: 10px;
  margin-bottom: 15px;
}

.generate-btn {
  flex: 1;
  padding: 14px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(135deg, #6366f1, #8b5cf6);
  color: white;
  cursor: pointer;
}

.secondary-btn {
  padding: 14px;
  border-radius: 12px;
  background: #111827;
  border: 1px solid #374151;
  color: white;
  cursor: pointer;
}

/* RESULT */
.result-top {
  display: flex;
  justify-content: space-between;
  margin-bottom: 10px;
}

.output {
  white-space: pre-wrap;
  background: rgba(255,255,255,0.04);
  padding: 16px;
  border-radius: 12px;
  min-height: 120px;
}

/* MOBILE */
@media (max-width: 768px) {
  .brand-row {
    height: 40vh;
  }

  .brand-logo {
    max-height: 280px;
  }

  .action-row {
    flex-direction: column;
  }
}
</style>
</head>

<body>

<div class="wrap">

  <div class="hero">
    <div class="hero-badge">CREATIVE ENGINE</div>

    <div class="brand-row">
      <img src="logo.png" class="brand-logo">
    </div>

    <div class="subtext">
      Turn simple ideas into premium creative concepts.
    </div>

    <div class="hero-caption">
      Built to create ads, music videos, trailers, and more.
    </div>
  </div>

  <div class="panel">

    <div class="modes">
      <button class="mode-btn active" onclick="setMode(this,'cinematic-ad')">🎬 Cinematic Ad</button>
      <button class="mode-btn" onclick="setMode(this,'music-video')">🎵 Music Video</button>
      <button class="mode-btn" onclick="setMode(this,'film-trailer')">🎞 Film Trailer</button>
      <button class="mode-btn" onclick="setMode(this,'gospel-visual')">✝️ Gospel Visual</button>
      <button class="mode-btn" onclick="setMode(this,'viral-short')">📱 Viral Short</button>
    </div>

    <textarea id="prompt" placeholder="Describe your idea..."></textarea>

    <div class="action-row">
      <button class="generate-btn" onclick="generate()">Generate</button>
      <button class="secondary-btn" onclick="clearPrompt()">Clear</button>
    </div>

    <div class="result-top">
      <span>Result</span>
      <button class="secondary-btn" onclick="copyAll()">Copy All</button>
    </div>

    <div class="output" id="output">Your result will appear here...</div>

  </div>

</div>

<script>
let mode = "cinematic-ad";

function setMode(btn, m) {
  mode = m;
  document.querySelectorAll(".mode-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
}

function clearPrompt() {
  document.getElementById("prompt").value = "";
}

async function copyAll() {
  navigator.clipboard.writeText(document.getElementById("output").innerText);
}

async function generate() {
  const prompt = document.getElementById("prompt").value;
  const output = document.getElementById("output");

  output.innerText = "Generating...";

  const res = await fetch("/generate", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ prompt, mode })
  });

  const data = await res.json();
  output.innerText = data.result;
}
</script>

</body>
</html>
