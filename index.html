<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Visyonix</title>

  <!-- GOOGLE ANALYTICS -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-M3WVYET0V7"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-M3WVYET0V7', { send_page_view: true });
  </script>

  <style>
    /* KEEPING YOUR FULL STYLE (TRIMMED HERE FOR SPACE BUT KEEP YOUR ORIGINAL) */
  </style>
</head>

<body>
  <!-- KEEP YOUR FULL UI EXACTLY AS IS -->

<script>
let currentMode = "cinematic ad";
const API_BASE = "https://visionforge-z9yx.onrender.com";

/* ANALYTICS SAFE WRAPPER */
function trackEvent(name, params = {}) {
  try {
    if (typeof gtag === "function") {
      gtag("event", name, params);
    }
  } catch(e){}
}

/* PAGE LOAD */
window.addEventListener("load", () => {
  trackEvent("page_load", {
    page_title: document.title,
    page_path: location.pathname
  });
});

/* MODE SELECT */
document.querySelectorAll(".mode-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".mode-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    currentMode = btn.dataset.mode;
    trackEvent("mode_selected", { mode: currentMode });
  });
});

const generateBtn = document.getElementById("generateBtn");
const clearBtn = document.getElementById("clearBtn");
const copyAllBtn = document.getElementById("copyAllBtn");
const ideaInput = document.getElementById("ideaInput");
const resultsArea = document.getElementById("resultsArea");

/* CLEAR */
clearBtn.addEventListener("click", () => {
  ideaInput.value = "";
  ideaInput.focus();
  trackEvent("clear_clicked", { mode: currentMode });
});

/* COPY ALL */
copyAllBtn.addEventListener("click", async () => {
  const blocks = [...document.querySelectorAll("#resultsArea pre")]
    .map(pre => pre.textContent.trim())
    .join("\n\n");

  try {
    await navigator.clipboard.writeText(blocks);
    trackEvent("copy_all", { characters: blocks.length });
  } catch {
    trackEvent("copy_all_error");
  }
});

/* COPY SECTION */
async function copyCard(button) {
  const text = button.closest(".result-card, .scene-card")
    .querySelector("pre").textContent.trim();

  try {
    await navigator.clipboard.writeText(text);

    const sectionName =
      button.closest(".result-card, .scene-card")
      ?.querySelector("h4")?.textContent || "section";

    trackEvent("copy_section", {
      section: sectionName,
      characters: text.length
    });

  } catch {
    trackEvent("copy_section_error");
  }
}
window.copyCard = copyCard;

/* GENERATE */
generateBtn.addEventListener("click", async () => {

  const input = ideaInput.value.trim();

  if (!input) {
    alert("Please enter a concept first.");
    return;
  }

  trackEvent("generate_clicked", {
    mode: currentMode,
    prompt_length: input.length
  });

  generateBtn.disabled = true;
  generateBtn.textContent = "Generating...";

  try {

    const res = await fetch(API_BASE + "/generate", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        mode: currentMode,
        prompt: input
      })
    });

    const data = await res.json();
    const output = data.result || "No response returned.";

    resultsArea.innerHTML = "<pre>" + output + "</pre>";

    trackEvent("generate_success", {
      mode: currentMode,
      result_length: output.length
    });

  } catch (error) {

    resultsArea.innerHTML = "<pre>" + error.message + "</pre>";

    trackEvent("generate_error", {
      error: error.message
    });

  }

  generateBtn.disabled = false;
  generateBtn.textContent = "Generate";
});

/* EXPORT TRACKING (future safe) */
document.addEventListener("click", e => {
  const btn = e.target.closest("[data-export]");
  if (btn) {
    trackEvent("export_clicked", {
      type: btn.dataset.export || "unknown"
    });
  }
});
</script>

</body>
</html>
