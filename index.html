<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Visionforge</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  padding: 30px 20px;
  font-family: Arial, sans-serif;
  background:
    radial-gradient(circle at top, rgba(99, 102, 241, 0.14), transparent 30%),
    linear-gradient(180deg, #07070a 0%, #111827 100%);
  color: #ffffff;
}

.wrap {
  max-width: 920px;
  margin: 0 auto;
}

/* 🔥 HERO FIXED (smaller + tighter) */
.hero {
  margin-bottom: 18px;
  padding: 12px 18px 10px; /* reduced */
  border-radius: 16px;
  background: linear-gradient(135deg, rgba(79, 70, 229, 0.12), rgba(255,255,255,0.02));
  border: 1px solid rgba(255,255,255,0.06);
  text-align: center;
}

.hero-badge {
  display: inline-block;
  margin-bottom: 8px;
  padding: 5px 10px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: bold;
  color: #c7d2fe;
  background: rgba(99, 102, 241, 0.14);
}

/* 🔥 LOGO SIZE FIX */
.hero-logo {
  width: 160px;       /* smaller */
  max-width: 60%;
  margin: 6px auto;
  display: block;
}

/* tighter text spacing */
.subtext {
  font-size: 15px;
  color: #d1d5db;
  margin: 8px 0 10px;
}

.hero-caption {
  font-size: 13px;
  color: #9ca3af;
  border-left: 2px solid rgba(99,102,241,0.4);
  padding-left: 10px;
  margin-top: 8px;
  text-align: left;
}

.panel {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 16px;
  padding: 20px;
}

.section-label {
  font-size: 12px;
  color: #bbb;
  margin-bottom: 10px;
}

textarea {
  width: 100%;
  min-height: 150px;
  padding: 14px;
  border-radius: 12px;
  border: 1px solid #374151;
  background: #0f172a;
  color: white;
  margin-bottom: 12px;
}

.action-row {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.primary-btn {
  background: #4f46e5;
  color: white;
  padding: 10px 14px;
  border-radius: 10px;
  border: none;
}

.secondary-btn {
  background: #1f2937;
  color: white;
  padding: 10px 14px;
  border-radius: 10px;
  border: none;
}

#result {
  margin-top: 12px;
  padding: 16px;
  background: #0b1220;
  border-radius: 12px;
  min-height: 150px;
}

/* result cards */
.result-card {
  margin-bottom: 12px;
  padding: 12px;
  border-radius: 10px;
  background: rgba(79,70,229,0.08);
}

.result-card-title {
  font-weight: bold;
  color: #a5b4fc;
  margin-bottom: 6px;
}
</style>
</head>

<body>
<div class="wrap">

<div class="hero">
  <div class="hero-badge">Creative Engine</div>

  <!-- 🔥 LOGO -->
  <img src="logo.png" class="hero-logo">

  <div class="subtext">
    Turn simple ideas into premium creative concepts, structured prompts, and cinematic direction.
  </div>

  <div class="hero-caption">
    Built for creators who want speed, clarity, and strong output.
  </div>
</div>

<div class="panel">

<div class="section-label">Enter your idea</div>

<textarea id="prompt" placeholder="Example: luxury car commercial at night"></textarea>

<div class="action-row">
  <button class="primary-btn" onclick="generate()">Generate</button>
  <button class="secondary-btn" onclick="clearPrompt()">Clear</button>
  <button class="secondary-btn" onclick="copyResult()">Copy</button>
</div>

<div id="result">Your result will appear here.</div>

</div>
</div>

<script>

function clearPrompt(){
  document.getElementById("prompt").value="";
  document.getElementById("result").innerHTML="Your result will appear here.";
}

function prettifyResult(text){
  return text
    .replace(/CONCEPT TITLE:/g,"🔥 CONCEPT TITLE:")
    .replace(/CORE PROMPT:/g,"🎯 CORE PROMPT:")
    .replace(/SCENE BREAKDOWN:/g,"🎬 SCENE BREAKDOWN:");
}

function formatToHTML(text){
  return text.split("\n\n").map(section=>{
    const parts = section.split("\n");
    return `
      <div class="result-card">
        <div class="result-card-title">${parts[0]}</div>
        <div>${parts.slice(1).join("<br>")}</div>
      </div>
    `;
  }).join("");
}

async function generate(){
  const prompt = document.getElementById("prompt").value.trim();
  const resultBox = document.getElementById("result");

  if(!prompt){
    resultBox.innerText="Enter an idea first";
    return;
  }

  resultBox.innerText="Generating...";

  try{
    const res = await fetch("/generate",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({prompt})
    });

    const data = await res.json();

    if(!data.result){
      resultBox.innerText="No response";
      return;
    }

    const formatted = prettifyResult(data.result);
    resultBox.innerHTML = formatToHTML(formatted);

  }catch(err){
    resultBox.innerText="Error generating";
  }
}

function copyResult(){
  const text = document.getElementById("result").innerText;
  navigator.clipboard.writeText(text);
}

</script>

</body>
</html>
