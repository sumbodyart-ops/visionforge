<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Visionforge</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 40px 20px;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top, rgba(99, 102, 241, 0.14), transparent 30%),
        linear-gradient(180deg, #07070a 0%, #111827 100%);
      color: #ffffff;
    }

    .wrap { max-width: 920px; margin: 0 auto; }

    .hero {
      margin-bottom: 28px;
      padding: 26px 24px 8px;
      border-radius: 22px;
      background: linear-gradient(135deg, rgba(79, 70, 229, 0.14), rgba(255, 255, 255, 0.03));
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 12px 36px rgba(0, 0, 0, 0.24);
      text-align: center;
    }

    .hero-logo {
      width: 80%;
      max-width: 600px;
      margin: 0 auto 20px;
      display: block;
      filter: drop-shadow(0 0 20px rgba(250, 204, 21, 0.25));
    }

    .hero-badge {
      display: inline-block;
      margin-bottom: 14px;
      padding: 7px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: bold;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #c7d2fe;
      background: rgba(99, 102, 241, 0.16);
      border: 1px solid rgba(99, 102, 241, 0.25);
    }

    .subtext {
      color: #d1d5db;
      font-size: 17px;
      line-height: 1.65;
      margin-bottom: 18px;
      max-width: 760px;
      margin-left: auto;
      margin-right: auto;
    }

    .hero-caption {
      color: #9ca3af;
      font-size: 14px;
      line-height: 1.55;
      max-width: 720px;
      padding-left: 14px;
      border-left: 3px solid rgba(99, 102, 241, 0.45);
      margin: 0 auto;
      text-align: left;
    }

    .panel {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 18px;
      padding: 22px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.28);
      backdrop-filter: blur(6px);
    }

    .section-label {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #bdbdbd;
      margin-bottom: 12px;
      font-weight: bold;
    }

    .modes {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 22px;
    }

    .mode-btn {
      background: #1f2937;
      color: #e5e7eb;
      border: 1px solid #374151;
      padding: 10px 14px;
      border-radius: 999px;
      cursor: pointer;
    }

    .mode-btn.active {
      background: #4f46e5;
      color: #ffffff;
    }

    textarea {
      width: 100%;
      min-height: 170px;
      padding: 16px;
      border-radius: 14px;
      border: 1px solid #374151;
      background: #0f172a;
      color: #ffffff;
      margin-bottom: 16px;
    }

    .action-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }

    .primary-btn {
      background: #4f46e5;
      color: #ffffff;
      padding: 12px 18px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
    }

    .secondary-btn {
      background: #1f2937;
      color: #ffffff;
      padding: 12px 18px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
    }

    #result {
      margin-top: 10px;
      padding: 18px;
      background: #0b1220;
      border-radius: 14px;
      min-height: 180px;
    }

    .result-card {
      margin-bottom: 16px;
      padding: 14px;
      border-radius: 12px;
      background: rgba(79, 70, 229, 0.08);
    }
  </style>
</head>

<body>
<div class="wrap">

  <div class="hero">
    <div class="hero-badge">Creative Engine</div>

    <!-- ✅ LOGO HERE -->
    <img src="logo.png" alt="Logo" class="hero-logo">

    <div class="subtext">
      Turn simple ideas into premium creative concepts, structured prompts, and cinematic direction creators can use immediately.
    </div>

    <div class="hero-caption">
      Built to help you shape ads, music videos, trailers, gospel visuals, and short-form content.
    </div>
  </div>

  <div class="panel">

    <div class="section-label">Choose a mode</div>

    <div class="modes">
      <button class="mode-btn active" onclick="setMode('cinematic-ad', this)">🎬 Cinematic Ad</button>
      <button class="mode-btn" onclick="setMode('music-video', this)">🎵 Music Video</button>
      <button class="mode-btn" onclick="setMode('film-trailer', this)">🎞 Film Trailer</button>
      <button class="mode-btn" onclick="setMode('gospel-visual', this)">✝️ Gospel Visual</button>
      <button class="mode-btn" onclick="setMode('viral-short', this)">📱 Viral Short</button>
    </div>

    <textarea id="prompt"></textarea>

    <div class="action-row">
      <button class="primary-btn" onclick="generate()">Generate</button>
      <button class="secondary-btn" onclick="clearPrompt()">Clear</button>
      <button class="secondary-btn" onclick="copyResult()">Copy</button>
    </div>

    <div id="result">Your result will appear here.</div>

  </div>

</div>

<script>
let selectedMode = "cinematic-ad";

function setMode(mode, btn){
  selectedMode = mode;
  document.querySelectorAll(".mode-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
}

function clearPrompt(){
  document.getElementById("prompt").value="";
}

function formatToHTML(text){
  return text.split("\n\n").map(s=>`<div class="result-card">${s.replace(/\n/g,"<br>")}</div>`).join("");
}

async function generate(){

  const prompt = document.getElementById("prompt").value.trim();
  const resultBox = document.getElementById("result");

  if(!prompt){
    resultBox.innerText="Enter something first";
    return;
  }

  resultBox.innerText="Generating...";

  try{
    const res = await fetch("/generate",{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify({prompt, mode:selectedMode})
    });

    const data = await res.json();

    if(!data.result){
      resultBox.innerText="No response";
      return;
    }

    resultBox.innerHTML = formatToHTML(data.result);

  }catch(e){
    resultBox.innerText="Error generating";
  }
}

function copyResult(){
  navigator.clipboard.writeText(document.getElementById("result").innerText);
}
</script>

</body>
</html>
