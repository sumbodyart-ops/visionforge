  <style>
    :root {
      --bg: #030303;
      --text: #f5f5f8;
      --muted: #a6a6b2;
      --line: rgba(255,255,255,0.12);
      --blue: #5f8cff;
      --violet: #9a6bff;
      --shadow: 0 25px 70px rgba(0,0,0,0.5);
      --radius: 28px;
      --max: 1480px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at 14% 18%, rgba(95, 140, 255, 0.12), transparent 24%),
        radial-gradient(circle at 84% 14%, rgba(154, 107, 255, 0.10), transparent 20%),
        radial-gradient(circle at 52% 86%, rgba(95, 140, 255, 0.08), transparent 28%),
        linear-gradient(180deg, #000000 0%, #050507 50%, #09090c 100%);
      color: var(--text);
      font-family: Inter, Arial, Helvetica, sans-serif;
    }

    body {
      overflow-x: hidden;
    }

    .bg-noise {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.06;
      background-image:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 22px 22px;
      mask-image: radial-gradient(circle at center, black 40%, transparent 100%);
    }

    .shell {
      width: min(var(--max), calc(100% - 34px));
      margin: 0 auto;
      padding: 26px 0 60px;
      position: relative;
      z-index: 1;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 22px;
      padding: 18px 22px;
      border: 1px solid var(--line);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.07), rgba(255,255,255,0.03)),
        radial-gradient(circle at left top, rgba(95, 140, 255, 0.08), transparent 36%);
      border-radius: 24px;
      backdrop-filter: blur(20px);
      box-shadow: var(--shadow);
      animation: fadeUp 0.95s ease-out both;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 20px;
      min-width: 0;
    }

    .brand-mark {
      width: 104px;
      height: 104px;
      border-radius: 28px;
      background:
        radial-gradient(circle at 28% 28%, rgba(255,255,255,0.24), rgba(255,255,255,0.05) 36%, rgba(255,255,255,0.02) 72%),
        radial-gradient(circle at 78% 18%, rgba(95, 140, 255, 0.16), transparent 36%);
      border: 1px solid rgba(255,255,255,0.14);
      display: grid;
      place-items: center;
      overflow: hidden;
      flex-shrink: 0;
      box-shadow:
        0 18px 45px rgba(0,0,0,0.45),
        0 0 24px rgba(95, 140, 255, 0.12);
    }

    .brand-mark img {
      width: 82%;
      height: 82%;
      object-fit: contain;
      filter:
        drop-shadow(0 8px 18px rgba(95, 140, 255, 0.32))
        drop-shadow(0 0 20px rgba(154, 107, 255, 0.12));
    }

    .brand-copy {
      min-width: 0;
    }

    .eyebrow {
      font-size: 12px;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .brand-copy h1 {
      margin: 0;
      font-size: clamp(2.35rem, 4.2vw, 4.2rem);
      letter-spacing: -0.05em;
      line-height: 0.92;
      text-shadow:
        0 0 18px rgba(95, 140, 255, 0.10),
        0 0 26px rgba(154, 107, 255, 0.06);
    }

    .brand-copy p {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 1rem;
      max-width: 700px;
      line-height: 1.35;
    }

    .top-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .ghost-pill {
      border: 1px solid rgba(255,255,255,0.12);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.03)),
        radial-gradient(circle at center, rgba(95, 140, 255, 0.08), transparent 70%);
      color: var(--text);
      border-radius: 999px;
      padding: 12px 18px;
      font-size: 0.92rem;
      letter-spacing: 0.01em;
      white-space: nowrap;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
    }

    .hero {
      display: grid;
      grid-template-columns: 1.18fr 0.82fr;
      gap: 18px;
      margin-bottom: 18px;
    }

    .hero-card,
    .video-card,
    .panel,
    .results-card {
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255,255,255,0.07), rgba(255,255,255,0.03));
      backdrop-filter: blur(18px);
      box-shadow: var(--shadow);
      overflow: hidden;
      position: relative;
    }

    .hero-card {
      padding: clamp(28px, 4vw, 52px);
      min-height: 480px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      background:
        radial-gradient(circle at 18% 12%, rgba(95, 140, 255, 0.18), transparent 24%),
        radial-gradient(circle at 78% 18%, rgba(154, 107, 255, 0.12), transparent 28%),
        linear-gradient(135deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));
      animation: fadeUp 1.1s ease-out both;
    }

    .hero-fade {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(115deg, rgba(0,0,0,0.88) 0%, rgba(0,0,0,0.48) 40%, rgba(0,0,0,0.18) 100%);
      pointer-events: none;
    }

    .hero-beam {
      position: absolute;
      inset: -10% -10% auto auto;
      width: 55%;
      height: 55%;
      background: radial-gradient(circle, rgba(95, 140, 255, 0.13), transparent 68%);
      filter: blur(24px);
      pointer-events: none;
      opacity: 0.9;
    }

    .hero-logo-wrap {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      pointer-events: none;
      overflow: hidden;
    }

    .hero-logo {
      width: min(78%, 860px);
      opacity: 0.19;
      filter:
        drop-shadow(0 24px 55px rgba(0,0,0,0.8))
        drop-shadow(0 0 28px rgba(95, 140, 255, 0.22))
        drop-shadow(0 0 40px rgba(154, 107, 255, 0.12));
      transform: translateY(90px) scale(0.9);
      animation: glideIn 1.7s cubic-bezier(.18,.89,.32,1.02) forwards;
    }

    .hero-copy {
      position: relative;
      z-index: 1;
      max-width: 760px;
    }

    .kicker {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      border-radius: 999px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.07), rgba(255,255,255,0.04)),
        radial-gradient(circle at center, rgba(95, 140, 255, 0.10), transparent 75%);
      border: 1px solid rgba(255,255,255,0.12);
      color: #f7f7fb;
      font-size: 0.85rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 18px;
      box-shadow: 0 0 18px rgba(95, 140, 255, 0.08);
    }

    .hero-copy h2 {
      margin: 0 0 16px;
      font-size: clamp(2.8rem, 5.2vw, 5.5rem);
      line-height: 0.92;
      letter-spacing: -0.055em;
      max-width: 12ch;
      text-shadow:
        0 0 18px rgba(95, 140, 255, 0.10),
        0 0 26px rgba(154, 107, 255, 0.06);
    }

    .hero-copy p {
      margin: 0;
      color: #d0d0d8;
      font-size: clamp(1rem, 1.35vw, 1.15rem);
      line-height: 1.65;
      max-width: 60ch;
    }

    .video-card {
      min-height: 480px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      background:
        radial-gradient(circle at top right, rgba(95, 140, 255, 0.14), transparent 26%),
        radial-gradient(circle at top left, rgba(154, 107, 255, 0.10), transparent 20%),
        linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.025));
      animation: fadeUp 1.25s ease-out both;
    }

    .card-label {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: var(--muted);
    }

    .video-stage {
      flex: 1;
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.12);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.015)),
        radial-gradient(circle at center, rgba(95, 140, 255, 0.08), rgba(0,0,0,0.62));
      display: grid;
      place-items: center;
      overflow: hidden;
      min-height: 316px;
      box-shadow: inset 0 0 28px rgba(95, 140, 255, 0.08);
    }

    .video-stage video,
    .video-stage img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .video-placeholder {
      text-align: center;
      padding: 24px;
      color: var(--muted);
      max-width: 32ch;
      line-height: 1.6;
    }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .stat {
      background:
        linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.03)),
        radial-gradient(circle at top, rgba(95, 140, 255, 0.08), transparent 70%);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 16px 14px;
    }

    .stat strong {
      display: block;
      font-size: 1.28rem;
      margin-bottom: 6px;
    }

    .stat span {
      color: var(--muted);
      font-size: 0.9rem;
    }

    .workspace {
      display: grid;
      grid-template-columns: 1.08fr 0.92fr;
      gap: 18px;
      align-items: start;
    }

    .panel {
      padding: 22px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.07), rgba(255,255,255,0.03)),
        radial-gradient(circle at top left, rgba(95, 140, 255, 0.08), transparent 30%);
    }

    .panel-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 18px;
    }

    .panel-head h3,
    .results-top h3 {
      margin: 6px 0 0;
      font-size: 1.45rem;
      letter-spacing: -0.03em;
    }

    .panel-head p {
      margin: 8px 0 0;
      color: var(--muted);
      line-height: 1.55;
    }

    .how-to-box {
      margin-bottom: 16px;
      padding: 16px 18px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.08);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.02)),
        radial-gradient(circle at left, rgba(95, 140, 255, 0.06), transparent 38%);
      color: var(--muted);
      line-height: 1.6;
    }

    .how-to-box strong {
      color: var(--text);
      display: block;
      margin-bottom: 8px;
      font-size: 0.98rem;
    }

    .mode-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }

    .mode-btn {
      border: 1px solid rgba(255,255,255,0.11);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.03)),
        radial-gradient(circle at center, rgba(95, 140, 255, 0.04), transparent 72%);
      color: var(--text);
      border-radius: 18px;
      padding: 15px 16px;
      text-align: left;
      cursor: pointer;
      transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease, box-shadow 0.18s ease;
    }

    .mode-btn:hover,
    .mode-btn.active {
      transform: translateY(-2px);
      border-color: rgba(95, 140, 255, 0.42);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.10), rgba(255,255,255,0.045)),
        radial-gradient(circle at center, rgba(95, 140, 255, 0.12), transparent 72%);
      box-shadow:
        0 0 0 1px rgba(95, 140, 255, 0.10),
        0 0 18px rgba(95, 140, 255, 0.10);
    }

    .mode-btn strong {
      display: block;
      font-size: 1rem;
      margin-bottom: 6px;
    }

    .mode-btn span {
      display: block;
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.4;
    }

      min-height: 250px;
      resize: vertical;

        radial-gradient(circle at top left, rgba(95, 140, 255, 0.06), transparent 34%);
      color: var(--text);
