<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Visyonix</title>

  <!-- ✅ Google Analytics (YOUR REAL ID INSTALLED) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-M3WVYET0V7"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-M3WVYET0V7', { send_page_view: true });
  </script>

  <style>
    body{margin:0;background:#000;color:#fff;font-family:Arial}
    .shell{padding:20px}
    textarea{width:100%;height:120px}
    button{margin:5px;padding:10px;cursor:pointer}
  </style>
</head>

<body>

<div class="shell">

<h1>Visyonix</h1>

<div>
  <button class="mode-btn active" data-mode="cinematic ad">Cinematic Ad</button>
  <button class="mode-btn" data-mode="music video">Music Video</button>
  <button class="mode-btn" data-mode="film trailer">Film Trailer</button>
  <button class="mode-btn" data-mode="viral short">Viral Short</button>
</div>

<textarea id="ideaInput" placeholder="Type your idea..."></textarea>

<br>

<button id="generateBtn">Generate</button>
<button id="clearBtn">Clear</button>
<button id="copyAllBtn">Copy All</button>

<pre id="resultsArea">Waiting for generation...</pre>

</div>

<script>

let currentMode = "cinematic ad";
const API_BASE = "https://visionforge-z9yx.onrender.com";

/* ✅ SAFE ANALYTICS TRACKER */
function trackEvent(name, params = {}) {
  try {
    if (typeof gtag === "function") {
      gtag("event", name, params);
    }
  } catch(e){}
}

/* ✅ PAGE LOAD */
window.addEventListener("load", () => {
  trackEvent("page_load", { page: location.pathname });
});

/* ✅ MODE SELECT */
document.querySelectorAll(".mode-btn").forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll(".mode-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    currentMode = btn.dataset.mode;
    trackEvent("mode_selected", { mode: currentMode });
  };
});

const generateBtn = document.getElementById("generateBtn");
const clearBtn = document.getElementById("clearBtn");
const copyAllBtn = document.getElementById("copyAllBtn");
const ideaInput = document.getElementById("ideaInput");
const resultsArea = document.getElementById("resultsArea");

/* ✅ CLEAR */
clearBtn.onclick = () => {
  ideaInput.value = "";
  trackEvent("clear_clicked", { mode: currentMode });
};

/* ✅ COPY ALL */
copyAllBtn.onclick = async () => {
  const text = resultsArea.textContent;
  try {
    await navigator.clipboard.writeText(text);
    trackEvent("copy_all", { length: text.length });
  } catch {
    trackEvent("copy_error");
  }
};

/* ✅ GENERATE */
generateBtn.onclick = async () => {

  const input = ideaInput.value.trim();
  if (!input) {
    alert("Enter concept");
    return;
  }

  trackEvent("generate_clicked", {
    mode: currentMode,
    prompt_length: input.length
  });

  generateBtn.disabled = true;
  generateBtn.innerText = "Generating...";

  try {

    const res = await fetch(API_BASE + "/generate", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        mode: currentMode,
        prompt: input
      })
    });

    const data = await res.json();
    const output = data.result || "No response returned.";

    resultsArea.textContent = output;

    trackEvent("generate_success", {
      mode: currentMode,
      result_length: output.length
    });

  } catch (error) {

    resultsArea.textContent = error.message;

    trackEvent("generate_error", {
      error: error.message
    });

  }

  generateBtn.disabled = false;
  generateBtn.innerText = "Generate";
};

</script>

</body>
</html>
